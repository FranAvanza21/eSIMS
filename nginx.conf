server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options            "DENY"                             always;
    add_header X-Content-Type-Options     "nosniff"                          always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy
        "default-src 'none'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; font-src https://cdn.jsdelivr.net; connect-src 'self' https://sia.avanzasolutions.es; img-src 'self' data:; frame-ancestors 'none';"
        always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloquear acceso a ficheros ocultos (.gitignore, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}
